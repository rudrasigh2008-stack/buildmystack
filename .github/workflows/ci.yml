name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  cli-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install CLI dependencies
        run: npm install

      - name: Link CLI globally
        run: npm link

      - name: Test CLI generation (no install)
        run: |
          buildmystack test-app --no-install
          ls test-app

      - name: Validate generated structure
        run: |
          test -d test-app/client
          test -d test-app/server
